  <!-- Critical CSS: above-the-fold rendering (hero, header, typography) -->
  <style>
    :root {
      --color-obsidian-400: #0a0908;
      --color-charcoal-100: #231e1a;
      --color-agold-300: #d4a555;
      --color-agold-400: #c4924a;
      --color-agold-600: #96682e;
      --color-agold-700: #7a5425;
      --color-parchment-50: #faf6ef;
      --color-parchment-100: #f2e9da;
      --color-parchment-200: #e5d4b8;
      --color-parchment-400: #c4a370;
      --font-family-display: 'Playfair Display', Georgia, serif;
      --font-family-serif: 'Cormorant Garamond', Georgia, serif;
      --font-family-sans: 'Questrial', system-ui, sans-serif;
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: var(--font-family-sans);
      color: var(--color-parchment-200);
      background-color: var(--color-obsidian-400);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      margin: 0
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: var(--font-family-serif)
    }

    .font-display {
      font-family: var(--font-family-display)
    }

    picture {
      display: block;
      width: 100%;
      height: 100%
    }

    .glass-dark {
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      background: rgba(10, 9, 8, .88);
      border: 1px solid rgba(196, 146, 74, .06)
    }

    .text-fluid-3xl {
      font-size: clamp(3rem, 8vw, 7rem);
      line-height: .92
    }

    .tracking-extreme {
      letter-spacing: .35em
    }

    @keyframes ken-burns-drift {
      0% {
        transform: scale(1) translate(0, 0)
      }

      33% {
        transform: scale(1.08) translate(-.8%, -.3%)
      }

      66% {
        transform: scale(1.12) translate(.4%, -.8%)
      }

      100% {
        transform: scale(1.06) translate(-.2%, .3%)
      }
    }

    .ken-burns-drift {
      animation: ken-burns-drift 30s ease-in-out infinite alternate;
      will-change: transform
    }

    @keyframes clip-up-kf {
      from {
        clip-path: inset(100% 0 0 0);
        transform: translateY(50px)
      }

      to {
        clip-path: inset(0 0 0 0);
        transform: translateY(0)
      }
    }

    .clip-up {
      animation: clip-up-kf 1.6s cubic-bezier(.77, 0, .175, 1) forwards;
      will-change: clip-path, transform
    }

    .clip-hidden {
      clip-path: inset(100% 0 0 0);
      transform: translateY(50px)
    }

    .stagger-1 {
      animation-delay: .15s
    }

    .stagger-2 {
      animation-delay: .25s
    }

    .stagger-3 {
      animation-delay: .4s
    }

    .stagger-4 {
      animation-delay: .55s
    }

    .stagger-5 {
      animation-delay: .7s
    }

    .stagger-6 {
      animation-delay: .85s
    }

    .stagger-7 {
      animation-delay: 1s
    }

    .noise-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: .35;
      background-image: url('/noise.svg');
      background-repeat: repeat;
      mix-blend-mode: overlay
    }
  </style>
